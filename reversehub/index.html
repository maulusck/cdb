<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reversehub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#b7b8b2;
    --panel:#c3c4bd;
    --ink:#23262a;
    --dim:#5c605c;
    --line:#7e817b;
    --hair:#9a9c95;
  }

  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font:14px/1.5 'Share Tech Mono',monospace;
    padding:clamp(20px,5vh,64px) clamp(16px,5vw,40px);
    min-height:100vh;
    display:flex;justify-content:center;align-items:flex-start;
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;
    background:
      repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0 1px,transparent 1px 4px),
      repeating-linear-gradient(90deg,rgba(0,0,0,.02) 0 1px,transparent 1px 4px);
  }

  .panel{
    width:100%;max-width:880px;
    background:var(--panel);
    border:2px solid var(--ink);
    box-shadow:6px 6px 0 var(--line);
  }

  .titlebar{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 18px;background:var(--ink);color:var(--bg);
  }
  .titlebar .name{letter-spacing:.32em;text-transform:uppercase;font-size:15px}
  .titlebar .stat{font-size:12px;color:var(--hair)}

  table{width:100%;border-collapse:collapse}
  thead th{
    text-align:left;font-weight:400;color:var(--dim);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:10px 18px;border-bottom:2px solid var(--ink);
  }
  thead th.r{text-align:right}
  tbody tr{cursor:pointer;border-bottom:1px solid var(--hair)}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--ink);color:var(--bg)}
  tbody tr:hover td{color:var(--bg)}
  tbody tr:hover .tag{border-color:var(--bg);color:var(--bg)}
  td{padding:11px 18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  td.id{color:var(--dim);width:1%}
  td.dim{color:var(--dim)}
  td.route{letter-spacing:.04em}
  td.up{text-align:right;color:var(--dim)}

  .tag{
    display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--line);color:var(--dim);
    padding:1px 6px;border-radius:1px;
  }

  .msg{padding:30px 18px;color:var(--dim)}
  .msg.err{color:#8a3b1f}
</style>
</head>
<body>
<div class="panel">
  <div class="titlebar">
    <span class="name">reversehub</span>
    <span class="stat" id="stat">—</span>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>service</th><th>mode</th><th>route</th><th class="r">upstream</th></tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="5" class="msg">loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
  const rows=document.getElementById('rows');
  const stat=document.getElementById('stat');
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  async function load(){
    try{
      const r=await fetch('/services.json?_='+Date.now());
      if(!r.ok) throw new Error(r.statusText);
      render(await r.json());
    }catch(e){
      rows.innerHTML=`<tr><td colspan="5" class="msg err">fault: ${esc(e.message)}</td></tr>`;
      stat.textContent='0 routes';
    }
  }

  function render(svc){
    if(!svc.length){
      rows.innerHTML='<tr><td colspan="5" class="msg">no services defined</td></tr>';
      stat.textContent='0 routes';return;
    }
    rows.innerHTML=svc.map((s,i)=>{
      const host=(s.mode==='host');
      const route=host?s.domain:s.proxy_path;
      const target=host?('//'+s.domain):s.proxy_path;
      return `
      <tr onclick="location.href='${esc(target)}'">
        <td class="id">${String(i+1).padStart(2,'0')}</td>
        <td>${esc(s.name)}<span class="dim"> — ${esc(s.description||'')}</span></td>
        <td><span class="tag">${host?'host':'path'}</span></td>
        <td class="route">${esc(route)}</td>
        <td class="up">${esc(s.upstream)}${esc(s.upstream_path||'/')}</td>
      </tr>`;
    }).join('');
    stat.textContent=`${svc.length} route${svc.length!==1?'s':''}`;
  }

  load();
  setInterval(load,15000);
</script>
</body>
</html>
