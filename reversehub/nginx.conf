worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Hub + path-mode services (default server, catches unmatched hosts)
    server {
        listen __RH_PORT__ default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }
        location = /services.json {
            add_header Cache-Control "no-cache";
            try_files /services.json =404;
        }

        # mode=path : subpath proxy locations
        include /etc/nginx/locations.d/*.conf;
    }

    # mode=host : one root-proxy server per service, matched by Host header
    include /etc/nginx/servers.d/*.conf;
}
